name: Plugin CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build plugin bundles
        run: python3 .codex-dev/scripts/build-plugins.py

      - name: Validate source skills and plugins
        run: python3 .codex-dev/scripts/validate-skills.py

      - name: Check shell scripts syntax
        run: bash -n scripts/install-package.sh .codex-dev/scripts/sync-to-codex.sh

      - name: Check installer help
        run: scripts/install-package.sh --help

      - name: Package release assets
        run: python3 .codex-dev/scripts/package-release-assets.py

      - name: Dry-run raw sync to fake Codex Home
        env:
          HOME: ${{ runner.temp }}/fake-home
        run: |
          mkdir -p "$HOME/.codex/skills/.system"
          .codex-dev/scripts/sync-to-codex.sh --dry-run

      - name: Real raw sync to fake Codex Home
        env:
          HOME: ${{ runner.temp }}/fake-home
        run: |
          mkdir -p "$HOME/.codex/skills/.system"
          .codex-dev/scripts/sync-to-codex.sh

      - name: Verify generated plugin package
        run: |
          test -f plugins/fiction-core/.codex-plugin/plugin.json
          test -d plugins/fiction-core/skills/project-orchestrator
          test -d plugins/fiction-core/skills/continuity-keeper
          test -d plugins/fiction-core/skills/writer-assistant
          test -d plugins/fiction-core/skills/story-analyst
          test -d plugins/fiction-core/skills/project-bootstrap
          test -f plugins/engineering-addon/.codex-plugin/plugin.json
          test -d plugins/engineering-addon/skills/rfc-adr-assistant
          test -f plugins/obsidian-addon/.codex-plugin/plugin.json
          test -d plugins/obsidian-addon/skills/obsidian-compat
          test -f dist/fiction-core.zip
          test -f dist/engineering-addon.zip
          test -f dist/obsidian-addon.zip
          test -f dist/full.zip

      - name: Verify raw dev sync package
        env:
          HOME: ${{ runner.temp }}/fake-home
        run: |
          test -f "$HOME/.codex/skills/CONVENTIONS.md"
          test -d "$HOME/.codex/skills/_shared"
          test -d "$HOME/.codex/skills/project-orchestrator"
          test -d "$HOME/.codex/skills/continuity-keeper"
          test -d "$HOME/.codex/skills/writer-assistant"
          test -d "$HOME/.codex/skills/story-analyst"
          test -d "$HOME/.codex/skills/project-bootstrap"
