name: Feature request
description: Suggest a new capability, workflow, or improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: What user workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - project-orchestrator
        - continuity-keeper
        - writer-assistant
        - story-analyst
        - project-bootstrap
        - installer / scripts
        - documentation
        - CI / validation
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Include any workaround you use today.
